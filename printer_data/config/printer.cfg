#############################################################################################################
### MACRO CONFIGURATION
#############################################################################################################
[gcode_macro RatOS]
variable_relative_extrusion: False
variable_preheat_extruder: True
variable_preheat_extruder_temp: 200
variable_calibrate_bed_mesh: True
variable_nozzle_priming: "primeline" #"primeblob"
variable_nozzle_prime_start_x: "max" # min, max or number
variable_nozzle_prime_start_y: "min" # min, max or number
variable_nozzle_prime_direction: "auto" # auto, forwards, backwards
variable_start_print_park_in: "front"
variable_start_print_park_z_height: 20
variable_skew_profile: "my_skew"
variable_end_print_park_in: "back"
variable_pause_print_park_in: "front"
variable_macro_travel_speed: 300
variable_adaptive_mesh: True

[gcode_macro _bot_data]
variable_lapse_video_size: 0
variable_lapse_filename: 'None'
variable_lapse_path: 'None'
gcode:
    M118 Setting bot lapse variables

#############################################################################################################
### PRINTER CONFIGURATION
#############################################################################################################
[stepper_x]
dir_pin: x_dir_pin
rotation_distance: 40

[stepper_y]
dir_pin: y_dir_pin
rotation_distance: 40

[stepper_z]
dir_pin: !z0_dir_pin
rotation_distance: 4

[stepper_z1]
dir_pin: !z1_dir_pin
rotation_distance: 4

[stepper_z2]
dir_pin: !z2_dir_pin
rotation_distance: 4

[probe]
z_offset: 0.0
pin: ^probe_pin

[extruder]
nozzle_diameter: 0.4
dir_pin: !e_dir_pin
control: pid
pid_kp: 28.413
pid_ki: 1.334
pid_kd: 151.300

#[temperature_fan pi]
## Electronics fan PWM
#pin: PD15
#max_power: 0.60
#control: watermark
#max_delta: 5.0
#sensor_type: temperature_host
#min_temp: 10.0
#max_temp: 80.0
#target_temp: 55.0
#shutdown_speed: 0.0

[temperature_sensor chamber_temp]
sensor_type: Generic 3950
sensor_pin: PF5
min_temp: 0
max_temp: 75

[heater_bed]
control: pid
pid_Kp: 22.2
pid_Ki: 1.08
pid_Kd: 114

# ADXL345 resonance testing configuration
#[resonance_tester]
#probe_points:
#    100,100,20 # 200mm printer
#    150,150,20 # 300mm printer
#    200,200,20 # 400mm printer
#    250,250,20 # 500mm printer

[respond]

#[skew_correction my_skew]

[exclude_object]

# Enable arcs support
[gcode_arcs]
resolution: 0.1

#############################################################################################################
### USER OVERRIDES
### Anything custom you want to add, or RatOS configuration you want to override, do it here.
#############################################################################################################

[controller_fan controller_fan]
pin: PD12
stepper: stepper_x, stepper_y, stepper_z, extruder
heater: extruder